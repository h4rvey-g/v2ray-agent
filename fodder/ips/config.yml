  #   - '8000::/1'

listeners:
  - name: socks5-in-1
    type: socks
    port: 2023
    rule: sub-browser
proxy-groups:
  # url-test е°ҶжҢүз…§ url жөӢиҜ•з»“жһңдҪҝз”Ёе»¶иҝҹжңҖдҪҺиҠӮзӮ№
  - name: "auto_xray_only"
    type: url-test
    proxies:
      - bart
      - vmiss
    # tolerance: 150
    # lazy: true
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
  - name: "auto_all"
    type: url-test
    proxies:
      - bart
      - vmiss
      - vmiss_hysteria
    # tolerance: 150
    # lazy: true
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
# DNS жңҚеҠЎеҷЁй…ҚзҪ®(еҸҜйҖүпјӣиӢҘдёҚй…ҚзҪ®пјҢзЁӢеәҸеҶ…зҪ®зҡ„ DNS жңҚеҠЎдјҡиў«е…ій—ӯ)
dns:
  enable: true # жҳҜеҗҰеҗҜз”Ёdns false
  ipv6: false
  # prefer-h3: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip # жЁЎејҸпјҡredir-hostжҲ–fake-ip
  # use-hosts: true 
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5 # йҳҝйҮҢDNS
    - 8.8.8.8
    # - tls://223.5.5.5:853
  nameserver-policy:
   'spcnwikia.top': '223.5.5.5'
   'domain:xjtu.edu.cn': '223.5.5.5'
   'geosite:openai': 'https://dns.google/dns-query'
   'geosite:microsoft': 'https://dns.google/dns-query'
   'geosite:msn': 'https://dns.google/dns-query'
   'geosite:bing': 'https://dns.google/dns-query'
   'bingapis.com': 'https://dns.google/dns-query'
  #  '+.internal.crop.com': '10.0.0.1'
  #  'geosite:cn': https://doh.pub/dns-query
  #  'geosite:geolocation-!cn': [tls://8.8.4.4, https://1.0.0.1/dns-query]
  #  "www.baidu.com,+.google.cn": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  #  "geosite:private,apple": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  nameserver:
    - 223.5.5.5
    - https://dns.alidns.com/dns-query
    - 119.29.29.29
    # - tls://223.5.5.5:853 # зҷҫеәҰDNS
  fallback:
   - 8.8.8.8
   - https://1.1.1.1/dns-query
   - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    # ipcidr:
    #   - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
  # й…ҚзҪ®дёҚдҪҝз”Ё fake-ip зҡ„еҹҹеҗҚ
  fake-ip-filter:
    - "+.lan"
    # QQ Loopback
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - "+.linksys.com"
    - "+.pool.ntp.org"
    # Router
    - hiwifi.com
    - leike.cc
    - miwifi.com
    - my.router
    - peiluyou.com
    - phicomm.me
    - router.ctc
    - routerlogin.com
      # Tenda router
    - tendawifi.com
      # TP-Link router
    - tplinkwifi.net
      # Windows
    - вҖң+.msftconnecttest.comвҖқ
    - вҖң+.msftncsi.comвҖқ
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "www.msftconnecttest.com"
      # дёӯиҲҲи·Ҝз”ұеҷЁ
    - zte.home
      # Stun Services
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
      # Google Voices
    - "lens.l.google.com"
      # Nintendo Switch
    - "+.srv.nintendo.net"
      # PlayStation
    - "+.stun.playstation.net"
      # XBox
    - "xbox.*.*.microsoft.com"
    - "+.xboxlive.com"
      # Bilibili CDN
    - "+.mcdn.bilivideo.cn"
    - "*bili*"
