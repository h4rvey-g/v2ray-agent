mixed-port: 10801
allow-lan: true
mode: rule
log-level: debug
external-controller: :9090
geox-url:
  geoip: "https://ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://ghproxy.com/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
global-client-fingerprint: chrome
# interface-name: WLAN
ipv6: false

tun:
  enable: true
  device: meta              #MacOS建议删除此项
  stack: system             #system / gvisor / lwip liwp仅为1.13.2以上的功能
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  # mtu: 9000               #最大传输单元
  # strict_route: true      #将所有连接路由到tun来防止泄漏，但你的设备将无法其他设备被访问
  # inet4_route_address:      #启用 auto_route 时使用自定义路由而不是默认路由
  #   - 0.0.0.0/1
  #   - 128.0.0.0/1
  # inet6_route_address:      #启用 auto_route 时使用自定义路由而不是默认路由
  #   - '::/1'
  #   - '8000::/1'

listeners:
  - name: socks5-in-1
    type: socks
    port: 2023
    rule: sub-browser
proxy-groups:
  # url-test 将按照 url 测试结果使用延迟最低节点
  - name: "auto_xray_only"
    type: url-test
    proxies:
      - bart
      - vmiss
    # tolerance: 150
    # lazy: true
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
  - name: "auto_all"
    type: url-test
    proxies:
      - bart
      - vmiss
      - vmiss_hysteria
    # tolerance: 150
    # lazy: true
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
# DNS 服务器配置(可选；若不配置，程序内置的 DNS 服务会被关闭)
dns:
  enable: true # 是否启用dns false
  ipv6: false
  prefer-h3: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip # 模式：redir-host或fake-ip
  # use-hosts: true 
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 223.5.5.5 # 阿里DNS
    - 8.8.8.8
    - 1.1.1.1
  nameserver-policy:
   'spcnwikia.top': '223.5.5.5'
   'domain:xjtu.edu.cn': '223.5.5.5'
   'geosite:openai': 'https://dns.google/dns-query'
   'geosite:microsoft': 'https://dns.google/dns-query'
   'geosite:msn': 'https://dns.google/dns-query'
   'geosite:bing': 'https://dns.google/dns-query'
   'bingapis.com': 'https://dns.google/dns-query'
  #  '+.internal.crop.com': '10.0.0.1'
  #  'geosite:cn': https://doh.pub/dns-query
  #  'geosite:geolocation-!cn': [tls://8.8.4.4, https://1.0.0.1/dns-query]
  #  "www.baidu.com,+.google.cn": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  #  "geosite:private,apple": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  nameserver:
    - tls://223.5.5.5
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    # - tls://223.5.5.5:853 # 百度DNS
  fallback:
   - https://1.1.1.1/dns-query
   - https://1.0.0.1/dns-query
   - tls://dns.google
   - https://dns.quad9.net/dns-query
   - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
  # 配置不使用 fake-ip 的域名
  fake-ip-filter:
    - "*.lan"
    # QQ Loopback
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - "+.linksys.com"
    - "+.pool.ntp.org"
    # Router
    - hiwifi.com
    - leike.cc
    - miwifi.com
    - my.router
    - peiluyou.com
    - phicomm.me
    - router.ctc
    - routerlogin.com
      # Tenda router
    - tendawifi.com
      # TP-Link router
    - tplinkwifi.net
      # Windows
    - “+.msftconnecttest.com”
    - “+.msftncsi.com”
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "www.msftconnecttest.com"
      # 中興路由器
    - zte.home
      # Stun Services
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
      # Google Voices
    - "lens.l.google.com"
      # Nintendo Switch
    - "+.srv.nintendo.net"
      # PlayStation
    - "+.stun.playstation.net"
      # XBox
    - "xbox.*.*.microsoft.com"
    - "+.xboxlive.com"
      # Bilibili CDN
    - "+.mcdn.bilivideo.cn"
    - "*bili*"
proxies:
  - name: "bart"
    type: vless
    server: 156.251.130.60
    port: 14475
    uuid: a4e080df-c2aa-4c05-b759-6cd11bb59fc1
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: "download-installer.cdn.mozilla.net"
    reality-opts:
      public-key: NryIMJ3wtpUeSvIYNf5CCmFOlbl5cKEI0PGEnj8hWxQ
    client-fingerprint: chrome
  - name: "vmiss"
    type: vless
    server: 45.93.28.208
    port: 443
    uuid: 4f17dca2-f67d-4a9c-8bec-fab0160f5f09
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: vmiss.howies.live
    reality-opts:
      public-key: CPQoSrhCSPCH7VH26ozE7stujTwyFv-hH9vyjJeEECE
      short-id: 6ba85179e30d4fc2
    client-fingerprint: chrome # cannot be empty
  - name: "vmiss_hysteria"
    type: hysteria
    server: homer.howies.live
    port: 10000
    auth_str:  "7c72e318-0386-46f8-bfef-faa1956cf101" # 将会在未来某个时候删除
    # auth-str: yourpassword
    # obfs: obfs_str
