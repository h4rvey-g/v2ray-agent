      # Windows
    - вАЬ+.msftconnecttest.comвАЭ
    - вАЬ+.msftncsi.comвАЭ
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "www.msftconnecttest.com"
      # дЄ≠иИИиЈѓзФ±еЩ®
    - zte.home
      # Stun Services
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
