mixed-port: 10801
allow-lan: true
mode: rule
log-level: debug
external-controller: :9090
geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
global-client-fingerprint: chrome
# interface-name: WLAN
ipv6: false

tun:
  enable: true
  device: meta              #MacOS建议删除此项
  stack: mixed             #system / gvisor / lwip liwp仅为1.13.2以上的功能
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-detect-interface: true
  # mtu: 9000               #最大传输单元
  # strict_route: true      #将所有连接路由到tun来防止泄漏，但你的设备将无法其他设备被访问
  # inet4_route_address:      #启用 auto_route 时使用自定义路由而不是默认路由
  #   - 0.0.0.0/1
  #   - 128.0.0.0/1
  # inet6_route_address:      #启用 auto_route 时使用自定义路由而不是默认路由
  #   - '::/1'
  #   - '8000::/1'

proxy-groups:
  # url-test 将按照 url 测试结果使用延迟最低节点
  - name: "auto_xray_only"
    type: url-test
    proxies:
      - bart
      - vmiss
    url: "https://cp.cloudflare.com/generate_204"
    interval: 60
    tolerance: 50
  - name: "auto_all"
    type: url-test
    proxies:
      - bart
      - vmiss
      - vmiss_vision
      - vmiss_gRPC
      - bart_vision
      - bart_gRPC
    url: "https://cp.cloudflare.com/generate_204"
    interval: 60
    tolerance: 50
  - name: "bart_all"
    type: url-test
    proxies:
      - bart
      - bart_vision
      - bart_gRPC
    url: "https://cp.cloudflare.com/generate_204"
    interval: 60
    tolerance: 50
# profile:
#   store-selected: true
#   store-fake-ip: true
# DNS 服务器配置(可选；若不配置，程序内置的 DNS 服务会被关闭)
dns:
  enable: true # 是否启用dns false
  ipv6: false
  prefer-h3: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip # 模式：redir-host或fake-ip
  # use-hosts: true 
  fake-ip-range: 198.18.0.1/16
  default-nameserver: 
    - 8.8.8.8
    - 1.1.1.1
  nameserver-policy:
   'spcnwikia.top': 'https://dns.alidns.com/dns-query'
   '+.xjtu.edu.cn': 'https://dns.alidns.com/dns-query'
   'geosite:china-list': 'https://dns.alidns.com/dns-query'
   '+.howies.live': 'https://deans.howiesyu.link'
   '+.closeai.biz': 'https://deans.howiesyu.link'
   '+.fakeopenai.cn': 'https://deans.howiesyu.link'
   'geosite:github' : 'https://deans.howiesyu.link'
   'detectportal.firefox.com' : 'https://deans.howiesyu.link'
   'geosite:openai': 'https://deans.howiesyu.link'
   'geosite:bing': 'https://deans.howiesyu.link'
   'bingapis.com': 'https://deans.howiesyu.link'
   '+.bing.com': 'https://deans.howiesyu.link'
   'geosite:gfw': 'https://deans.howiesyu.link'
  #  '+.internal.crop.com': '10.0.0.1'
  #  'geosite:cn': https://doh.pub/dns-query
  #  'geosite:geolocation-!cn': [tls://8.8.4.4, https://1.0.0.1/dns-query]
  #  "www.baidu.com,+.google.cn": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  #  "geosite:private,apple": [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  nameserver:
   - https://doh.pub/dns-query
   - https://dns.alidns.com/dns-query
  fallback:
   - https://1.1.1.1/dns-query
   - https://deans.howiesyu.link/1:-B9_AP_52_8iQazAwBBUMCAAACAAGA==
   - https://max.rethinkdns.com/1:-B9_AP_52_8iQazAwBBUMCAAACAAGA==
   - https://sky.rethinkdns.com/1:-B9_AP_52_8iQazAwBBUMCAAACAAGA==
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
    domain:
      - '+.google.com'
      - '+.facebook.com'
      - '+.youtube.com'
  # 配置不使用 fake-ip 的域名
  fake-ip-filter:
    - "*.lan"
    # QQ Loopback
    - localhost.sec.qq.com
    - localhost.ptlogin2.qq.com
    - "+.linksys.com"
    - "+.pool.ntp.org"
    # Router
    - hiwifi.com
    - leike.cc
    - miwifi.com
    - my.router
    - peiluyou.com
    - phicomm.me
    - router.ctc
    - routerlogin.com
      # Tenda router
    - tendawifi.com
      # TP-Link router
    - tplinkwifi.net
      # Windows
    - “+.msftconnecttest.com”
    - “+.msftncsi.com”
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "www.msftconnecttest.com"
      # 中興路由器
    - zte.home
      # Stun Services
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
      # Google Voices
    - "lens.l.google.com"
      # Nintendo Switch
    - "+.srv.nintendo.net"
      # PlayStation
    - "+.stun.playstation.net"
      # XBox
    - "xbox.*.*.microsoft.com"
    - "+.xboxlive.com"
      # Bilibili CDN
    - "+.mcdn.bilivideo.cn"
    - "*bili*"
